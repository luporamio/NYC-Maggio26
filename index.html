// ── SIDEBAR TOGGLE ──────────────────────────────────────────
function toggleSidebar() {
  const sidebar = document.getElementById('sidebar');
  const overlay = document.getElementById('overlay');
  const btn = document.getElementById('toggle-btn');
  const isOpen = sidebar.classList.contains('open');
  if (isOpen) {
    sidebar.classList.remove('open');
    overlay.classList.remove('visible');
    btn.textContent = '☰';
  } else {
    sidebar.classList.add('open');
    overlay.classList.add('visible');
    btn.textContent = '✕';
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('visible');
  document.getElementById('toggle-btn').textContent = '☰';
}

}).addTo(map);

const hotelIcon = L.divIcon({
  html: `<div style="width:33px;height:33px;background:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:15px;box-shadow:0 3px 10px rgba(0,0,0,0.45);border:2px solid rgba(255,255,255,0.2);">🏨</div>`,
  iconSize: [33, 33], iconAnchor: [16, 16], className: ''
});
L.marker([40.7527, -73.9757], { icon: hotelIcon }).addTo(map)
  .bindPopup('<div class="popup-body"><div class="popup-name">🏨 Westgate NY Grand Central</div><div class="popup-addr">109 E 42nd St, Midtown</div></div>');

let currentLayer = null;

function markerIcon(color, emoji) {
  return L.divIcon({
    html: `<div style="width:32px;height:32px;background:${color};border-radius:50% 50% 50% 0;transform:rotate(-45deg);display:flex;align-items:center;justify-content:center;box-shadow:0 3px 12px rgba(0,0,0,0.5);border:2px solid rgba(255,255,255,0.22);"><span style="transform:rotate(45deg);font-size:13px;">${emoji}</span></div>`,
    iconSize: [32, 32], iconAnchor: [16, 32], popupAnchor: [0, -34], className: ''
  });
}

function selectDay(idx) {
  const day = days[idx];

  days.forEach((d, i) => {
    const t = document.getElementById('tab-' + i);
    t.classList.remove('active');
    if (i === idx) {
      t.classList.add('active');
      t.style.color = d.color;
      t.style.borderColor = d.color;
      t.style.background = d.colorBg;
    } else {
      t.style.color = '';
      t.style.borderColor = 'transparent';
      t.style.background = '';
    }
  });

  if (currentLayer) map.removeLayer(currentLayer);
  currentLayer = L.layerGroup();

  const coords = day.places.map(p => p.coords);

  L.polyline(coords, {
    color: day.color, weight: 2.5, opacity: 0.65, dashArray: '6, 9', smoothFactor: 1.2
  }).addTo(currentLayer);

  day.places.forEach((place) => {
    const imgHtml = place.image
      ? `<img class="popup-img" src="${place.image}" alt="${place.name}" onerror="this.style.display='none'">`
      : '';
    const mapsHtml = place.maps
      ? `<a href="${place.maps}" target="_blank" class="popup-maps" style="background:${day.color}22;border:1px solid ${day.color}55;color:${day.color};">&#x1F4CD; Apri in Google Maps</a>`
      : '';
    L.marker(place.coords, { icon: markerIcon(day.color, place.emoji) })
      .bindPopup(`
        ${imgHtml}
        <div class="popup-body">
          <div class="popup-name">${place.emoji} ${place.name}</div>
          <div class="popup-addr">${place.address}</div>
          ${place.note ? `<div class="popup-note" style="color:${day.color};">${place.note}</div>` : ''}
          ${mapsHtml}
        </div>
      `)
      .addTo(currentLayer);
  });

  currentLayer.addTo(map);
  map.flyToBounds(L.latLngBounds(coords), { padding: [55, 55], duration: 0.9, maxZoom: 14 });
  renderSidebar(day);
}

function renderSidebar(day) {
  document.getElementById('day-content').innerHTML = `
    <div style="margin-bottom:15px;">
      <h2 class="font-display" style="font-size:19px;font-weight:700;color:${day.color};margin-bottom:3px;">${day.title}</h2>
      <p style="font-size:11px;color:rgba(255,255,255,0.38);">${day.subtitle}</p>
    </div>
    <div id="places-list"></div>
  `;

  const list = document.getElementById('places-list');
  day.places.forEach((place, i) => {
    const el = document.createElement('div');
    el.className = 'place-item';
    el.style.animationDelay = (i * 0.045) + 's';
    el.innerHTML = `
      <div class="place-number" style="background:${day.color}20;color:${day.color};">${i + 1}</div>
      <div style="flex:1;min-width:0;">
        <div class="place-name">${place.emoji} ${place.name}</div>
        ${place.note ? `<div class="place-note">${place.note}</div>` : ''}
        <div style="display:flex;align-items:center;gap:8px;margin-top:3px;">
          <div class="place-address">${place.address}</div>
          ${place.maps ? `<a href="${place.maps}" target="_blank" onclick="event.stopPropagation();" style="font-size:10px;color:${day.color};text-decoration:none;opacity:0.8;white-space:nowrap;flex-shrink:0;">&#x1F4CD; Maps</a>` : ''}
        </div>
      </div>
    `;
    el.addEventListener('click', () => {
      map.flyTo(place.coords, 16, { duration: 0.75 });
      el.style.background = day.color + '14';
      setTimeout(() => el.style.background = '', 500);
      if (window.innerWidth <= 768) closeSidebar();
    });
    list.appendChild(el);
  });
}

const tabsRow = document.getElementById('tabs-row');
days.forEach((d, i) => {
  const btn = document.createElement('button');
  btn.className = 'day-tab';
  btn.id = 'tab-' + i;
  btn.textContent = d.label;
  btn.onclick = () => selectDay(i);
  tabsRow.appendChild(btn);
});

selectDay(0);
</script>
</body>
</html>
